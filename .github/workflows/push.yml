name: .NET

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        r-version: [ 'release', '4.5.0' ]

    steps:
    - uses: actions/checkout@master
    - name: Download compiled native libs
      uses: actions/download-artifact@v4
      with:
        path: native-artifacts
    - uses: r-lib/actions/setup-r@v2
      name: Setup R
      with:
        r-version: ${{ matrix.r-version }}
    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 10.0.x
    - name: Restore tool dependencies
      run: dotnet tool restore
    - name: FAKE build
      run: dotnet fsi build.fsx
    - name: Publish NuGets (if this version not published before)
      if: matrix.os == 'macos-latest'
      run: dotnet nuget push bin/*.nupkg -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGETKEY }} --skip-duplicate
