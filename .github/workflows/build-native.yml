name: Build Native Libraries

on:
  push:
    branches: [ main ]

jobs:
  build-native:
    strategy:
      matrix:
        r-version: [ '4.5.0' ]
        os: [macos-latest, windows-latest, ubuntu-latest]
        arch: [ x64, arm64 ]
        exclude:
        - os: macos-latest
          arch: x64
        - os: windows-latest
          arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup R (Linux/macOS)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}

      - name: Set R_HOME environment variable
        run:   |
          echo "R_HOME=$(R RHOME)"
          if [ "$RUNNER_OS" == "Linux" ]; then
                mkdir -p ~/.local/lib/R
                echo "R_LIBS_USER=~/.local/lib/R" >> "$GITHUB_ENV"
                echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" == "macOS" ]; then
                echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" == "Windows" ]; then
                echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          else
                echo "$RUNNER_OS not supported"
                exit 1
          fi
        shell: bash

      - name: Build native library
        working-directory: src/r-bridge/RBridge/native
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            clang -dynamiclib native_api.c \
              -o librbridge-native.dylib \
              -I"r-headers" -I"$R_HOME/include" -L"$R_HOME/lib" -lR -DR_INTERFACE_PTRS
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            gcc -shared -fPIC native_api.c \
              -o librbridge-native.so \
              -I"r-headers" -I"$R_HOME/include" -L"$R_HOME/lib" -lR -DR_INTERFACE_PTRS
          else
            gcc -shared -fPIC native_api.c \
              -o rbridge-native.dll \
              -I"/c/R/include" \
              -L"/c/R/bin/x64" \
              -lR \
              -DR_INTERFACE_PTRS
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            src/r-bridge/RBridge/native/*.dll
            src/r-bridge/RBridge/native/*.so
            src/r-bridge/RBridge/native/*.dylib