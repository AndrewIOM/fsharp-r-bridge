name: Build Native Libraries

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-native:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [x64, arm64]
        r-version: [ '4.5.0' ]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download R source headers
        shell: bash
        working-directory: src/r-bridge/RBridge/native
        run: |
          curl -L https://cran.r-project.org/src/base/R-4/R-${{ matrix.r-version }}.tar.gz -o R.tar.gz
          mkdir r-headers
          tar -xzf R.tar.gz --strip-components=2 -C r-headers R-${{ matrix.r-version }}/src/include

      - uses: r-lib/actions/setup-r@v2
        name: Setup R
        with:
          r-version: ${{ matrix.r-version }}

      - name: Build native library
        working-directory: src/r-bridge/RBridge/native
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            clang -dynamiclib native_api.c \
              -o librbridge-native.dylib \
              -I"r-headers" -I"$R_HOME/include" -L"$R_HOME/lib" -lR -DR_INTERFACE_PTRS
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            gcc -shared -fPIC native_api.c \
              -o librbridge-native.so \
              -I"r-headers" -I"$R_HOME/include" -L"$R_HOME/lib" -lR -DR_INTERFACE_PTRS
          else
            gcc -shared -fPIC native_api.c \
              -o rbridge-native.dll \
              -I"r-headers" \
              -I"$R_HOME/include" \
              -L"$R_HOME/bin/x64" \
              -lR \
              -DR_INTERFACE_PTRS
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            src/r-bridge/RBridge/native/*.dll
            src/r-bridge/RBridge/native/*.so
            src/r-bridge/RBridge/native/*.dylib