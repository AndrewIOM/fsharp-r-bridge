name: Build Native Libraries

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-native:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [x64, arm64]
        r-version: [ '4.5.0' ]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        name: Setup R
        with:
          r-version: ${{ matrix.r-version }}

      - name: Set R_HOME environment variable
        shell: bash
        run:   |
          if [ "$RUNNER_OS" == "Linux" ]; then
                mkdir -p ~/.local/lib/R
                echo "R_LIBS_USER=~/.local/lib/R" >> "$GITHUB_ENV"
                echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" == "macOS" ]; then
                echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" == "Windows" ]; then
                echo "R_HOME=$(R RHOME)" >> "$GITHUB_ENV"
          else
                echo "$RUNNER_OS not supported"
                exit 1
          fi

      - name: Build native library
        working-directory: src/r-bridge/RBridge/native
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            clang -dynamiclib native_api.c \
              -o librbridge-native.dylib \
              -I"$R_HOME/include" -L"$R_HOME/lib" -lR -DR_INTERFACE_PTRS
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            gcc -shared -fPIC native_api.c \
              -o librbridge-native.so \
              -I"$R_HOME/include" -L"$R_HOME/lib" -lR -DR_INTERFACE_PTRS
          else
             # Windows - find R headers explicitly
             R_INCLUDE_DIR=$(${R_HOME}/bin/R CMD config --cppflags | grep -oP '(?<=-I)[^ ]+' | head -1)
             if [ -z "$R_INCLUDE_DIR" ]; then
               R_INCLUDE_DIR="${R_HOME}/include"
             fi
             gcc -shared -fPIC native_api.c \
               -o rbridge-native.dll \
               -I"$R_INCLUDE_DIR" \
               -L"$R_HOME/bin/x64" \
               -lR \
               -DR_INTERFACE_PTRS
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            src/r-bridge/RBridge/native/*.dll
            src/r-bridge/RBridge/native/*.so
            src/r-bridge/RBridge/native/*.dylib